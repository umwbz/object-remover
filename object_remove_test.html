<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Object Remover</title>
<style>
  * { box-sizing: border-box; }

  body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #84fab0, #8fd3f4);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 0;
  }

  .container {
    background: #fff;
    padding: 35px 50px;
    border-radius: 25px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    text-align: center;
    width: 95%;
    max-width: 900px;
  }

  h1 {
    font-size: 28px;
    color: #333;
    margin-bottom: 25px;
  }

  input[type="file"] {
    display: none;
  }

  label {
    background: #007bff;
    color: white;
    padding: 12px 25px;
    border-radius: 10px;
    cursor: pointer;
    display: inline-block;
    font-size: 16px;
    transition: 0.3s;
  }

  label:hover {
    background: #0056d2;
  }

  #container {
    position: relative;
    display: inline-block;
    margin-top: 25px;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #ccc;
    max-width: 100%;
  }

  canvas {
    cursor: crosshair;
    display: block;
    border-radius: 10px;
    width: 100%;
    height: auto;
  }

  #submitBtn {
    background: #28a745;
    color: white;
    border: none;
    padding: 12px 30px;
    border-radius: 10px;
    font-size: 17px;
    cursor: pointer;
    transition: 0.3s;
    margin-top: 20px;
  }

  #submitBtn:hover {
    background: #218838;
  }

  #loading {
    display: none;
    margin-top: 15px;
    color: #555;
    font-size: 16px;
  }

  h2 {
    margin-top: 30px;
    color: #444;
    font-size: 22px;
  }

  #resultImg {
    width: 100%;
    max-height: 550px;
    object-fit: contain;
    border-radius: 12px;
    margin-top: 15px;
    display: none;
    border: 1px solid #ddd;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  }
</style>
</head>
<body>
<div class="container">
  <h1>🧹 AI Object Remover</h1>

  <label for="imageInput">📁 Pilih Gambar</label>
  <input type="file" id="imageInput" accept="image/*">

  <!-- Container untuk canvas -->
  <div id="container"></div>

  <button id="submitBtn">🚀 Hapus Objek</button>
  <div id="loading">Sedang memproses...</div>

  <h2>Hasil:</h2>
  <img id="resultImg" src="" alt="Hasil akan muncul di sini">
</div>

<script>
const imageInput = document.getElementById("imageInput");
const container = document.getElementById("container");
const submitBtn = document.getElementById("submitBtn");
const resultImg = document.getElementById("resultImg");
const loading = document.getElementById("loading");

let imageCanvas, maskCanvas;
let imageCtx, maskCtx;
let drawing = false;

// Load image & buat canvas
imageInput.addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const img = new Image();
  img.onload = () => {
    container.innerHTML = "";

    const scale = Math.min(800 / img.width, 600 / img.height, 1); // batasi ukuran max
    const newWidth = img.width * scale;
    const newHeight = img.height * scale;

    // buat canvas gambar utama
    imageCanvas = document.createElement("canvas");
    imageCanvas.width = newWidth;
    imageCanvas.height = newHeight;
    container.appendChild(imageCanvas);
    imageCtx = imageCanvas.getContext("2d");
    imageCtx.drawImage(img, 0, 0, newWidth, newHeight);

    // buat canvas mask
    maskCanvas = document.createElement("canvas");
    maskCanvas.width = newWidth;
    maskCanvas.height = newHeight;
    maskCanvas.style.position = "absolute";
    maskCanvas.style.top = "0";
    maskCanvas.style.left = "0";
    container.appendChild(maskCanvas);
    maskCtx = maskCanvas.getContext("2d");

    // event menggambar mask
    maskCanvas.addEventListener("mousedown", () => drawing = true);
    maskCanvas.addEventListener("mouseup", () => drawing = false);
    maskCanvas.addEventListener("mouseleave", () => drawing = false);

    maskCanvas.addEventListener("mousemove", (ev) => {
      if (!drawing) return;
      const rect = maskCanvas.getBoundingClientRect();
      const x = ev.clientX - rect.left;
      const y = ev.clientY - rect.top;
      maskCtx.fillStyle = "rgba(255,0,0,0.6)";
      maskCtx.beginPath();
      maskCtx.arc(x, y, 12, 0, Math.PI * 2);
      maskCtx.fill();
    });
  };
  img.src = URL.createObjectURL(file);
});

function dataURLToBlob(dataURL) {
  const byteString = atob(dataURL.split(',')[1]);
  const mimeString = dataURL.split(',')[0].split(':')[1].split(';')[0];
  const ab = new ArrayBuffer(byteString.length);
  const ia = new Uint8Array(ab);
  for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
  return new Blob([ab], { type: mimeString });
}

// Submit ke API
submitBtn.addEventListener("click", async () => {
  if (!imageCanvas || !maskCanvas) return alert("⚠️ Upload gambar dulu!");
  
  loading.style.display = "block";
  resultImg.style.display = "none";

  const imageDataURL = imageCanvas.toDataURL("image/png");
  const maskDataURL = maskCanvas.toDataURL("image/png");

  const formData = new FormData();
  formData.append("image", dataURLToBlob(imageDataURL), "image.png");
  formData.append("mask", dataURLToBlob(maskDataURL), "mask.png");

  try {
    const response = await fetch("https://umscorleonis-object-remover-space.hf.space/inpaint", {
      method: "POST",
      body: formData
    });
    const data = await response.json();

    if (data.result_base64) {
      resultImg.src = "data:image/png;base64," + data.result_base64;
      resultImg.style.display = "block";
      alert("✅ Objek berhasil dihapus!");
    } else {
      console.error(data);
      alert("❌ Gagal mendapatkan hasil. Cek console.");
    }
  } catch (err) {
    console.error(err);
    alert("❌ Terjadi error saat mengirim request.");
  } finally {
    loading.style.display = "none";
  }
});
</script>
</body>
</html>
